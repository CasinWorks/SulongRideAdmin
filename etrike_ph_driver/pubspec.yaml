name: etrike_ph_driver
description: Sulong Ride Apps — driver app (Smart Tricycle apps System) for company operators in the Philippines.
publish_to: 'none'
version: 1.2.0+6

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  supabase_flutter: ^2.8.3
  google_maps_flutter: ^2.10.0
  dio: ^5.7.0
  flutter_local_notifications: ^18.0.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.3.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  live_activities: ^2.4.3
  package_info_plus: ^8.3.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
